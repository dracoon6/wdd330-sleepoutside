<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h1>Review & Place your Order</h1>
        <form name="checkout" id="checkout-form">
          <fieldset>
            <legend>Shipping Address</legend>
            <label for="fname">First Name</label>
            <input type="text" name="fname" required />
            <label for="lname">Last Name</label>
            <input type="text" name="lname" required />
            <label for="street">Street</label>
            <input type="text" name="street" required />
            <label for="city">City</label>
            <input type="text" name="city" required />
            <label for="state">State</label>
            <input type="text" name="state" required />
            <label for="zip">Zip</label>
            <input type="text" name="zip" id="zip" required />
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number</label>
            <input type="text" name="cardNumber" required />
            <label for="expiration">Expiration Date</label>
            <input type="text" name="expiration" required />
            <label for="code">Security Code</label>
            <input type="text" name="code" required />
          </fieldset>
          
          <fieldset id="order-summary">
            <legend>Order Summary</legend>
            <ul>
              <li>
                <label>Item Subtotal(<span id="num-items"></span>)</label>
                <p id="subtotal"></p>
              </li>
              <li>
                <label>Shipping Estimate</label>
                <p id="shipping"></p>
              </li>
              <li>
                <label>Tax</label>
                <p id="tax"></p>
              </li>
              <li>
                <label>Order Total</label>
                <p id="orderTotal"></p>
              </li>
            </ul>
          </fieldset>
          <button type="submit" id="checkoutSubmit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
